<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded dark background matching the header logo mark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Magnifying-glass handle -->
  <rect
    x="40" y="40" width="16" height="6" rx="3"
    transform="rotate(45 43 43)"
    fill="#fafaf7"
  />

  <!-- Lens -->
  <circle cx="27" cy="27" r="14" fill="none" stroke="#fafaf7" stroke-width="4"/>

  <!-- Checkmark inside the lens -->
  <path
    d="M20 27 L25.5 32.5 L34 23"
    fill="none"
    stroke="#22c55e"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
